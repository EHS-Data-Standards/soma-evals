site_name: SOMA Evals
site_description: Evaluation framework for schema-guided text extraction using the SOMA LinkML model.
repo_url: https://github.com/EHS-Data-Standards/soma-evals
docs_dir: docs

theme:
  name: material

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Ablation Levels: ablation-levels.md
  - Models: models.md
  - Prompts: prompts.md
  - Running Evals: running-evals.md
  - Architecture: overview/architecture.md
  - About: about.md
