  - KeyEvent

relevant_sheets:
  - GeneExpressionAssay
  - GeneExpressionOutput
  - GobletCellAssay
  - GobletCellOutput
  - FoxJExpressionAssay
  - FoxJExpressionOutput
  - CellularSystem
