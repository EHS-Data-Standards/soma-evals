# Eval case: Ciliary function assay extraction
#
# Source: summary of ciliary beat frequency studies from soma/examples/
# Ground truth: hand-curated YAML from soma/examples/output/

name: ciliary_function
description: >
  Extract ciliary function assay data from a summary of cilia beat
  frequency studies. Tests extraction of assay metadata, study subjects,
  measurement outputs, and protocol details.

# Relevant soma classes to include when schema context is enabled
relevant_classes:
  - CiliaryFunctionAssay
  - CiliaryFunctionOutput
  - Assay
  - AssayOutputMeasurement
  - StudySubject
  - CellularSystem
  - Protocol
  - ExposureCondition
  - QuantityValue
  - NamedEntity
  - KeyEvent

# Relevant Excel sheets to include when format context is enabled
relevant_sheets:
  - CiliaryFunctionAssay
  - CiliaryFunctionOutput
  - StudySubject
  - CellularSystem
  - Protocol
  - ExposureCondition
  - KeyEvent

# Path to ground truth YAML (relative to datasets/)
ground_truth: ground_truth/Container-ciliary_function.yaml

# Source text for extraction
source_text: |
  Study: CBF measurement after ozone exposure (in vitro)

  Primary human bronchial epithelial cells (HBE) were cultured at
  air-liquid interface (ALI) on transwell inserts. Cells were from
  Homo sapiens donors, specifically bronchial epithelial cells
  (CL:0002328) from the bronchus (UBERON:0002031). Cultures were
  maintained at passage 2 with a seeding density of 200,000 cells
  per square centimeter.

  The study investigated decreased ciliary function as a Key Event,
  specifically measuring cilia beat frequency (CBF) in response to
  ozone exposure. The cell culture used air-liquid interface growth
  mode on transwell insert substrates, with 21 days at ALI and 3
  replicates per donor. Culture medium was PneumaCult-ALI supplemented
  with hydrocortisone (0.48 ug/mL).

  CBF was measured using high-speed video microscopy at 37 degrees
  Celsius. The imaging protocol captured video at a specified frame
  rate, with the field of view focused on ciliated regions. Analysis
  was performed using automated software to determine beat frequency
  in Hertz (Hz).

  The exposure condition was ozone (CHEBI:25812) delivered via
  inhalation exposure at controlled concentrations. This assay informs
  on the Key Event "Decreased ciliary function" at the cellular level
  of biological organization, with a biological action of "decreased".
